<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0145fe">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Alireza Baratian</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="icon" href="./images/favicon.svg" type="image/svg+xml">
    <script src="./js/script.js" defer></script>
</head>

<body>
    <main>
        <div class="intro">
            <div class="intro-text">
                <p>👋🏼 Hi <br> 🙃 My name is Alireza Baratian <br> 😎 My personal website is about to launch in</p>
            </div>
            <div class="intro-img">
                <img src="./images/Profile Picture.jpg" alt="Profile Picture">
            </div>
        </div>
        <div class="countdown">
            <div class="rocket">
                <img src="./images/Rocket.svg" alt="">
            </div>
            <div class="timer">
                <div class="t-minus">
                    <h1>T</h1>
                    <h1>-</h1>
                </div>
                <div class="timer-details">
                    <div class="timer-units">
                        <h4>Days</h4>
                        <h4>Hours</h4>
                        <h4>Minutes</h4>
                        <h4>Seconds</h4>
                    </div>
                    <div class="timer-data">
                        <h1 id="days"></h1>
                        <h1 id="hours"></h1>
                        <h1 id="minutes"></h1>
                        <h1 id="seconds"></h1>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>

</html>
